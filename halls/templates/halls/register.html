{% extends 'halls/base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<div style="max-width: 520px; margin: 2rem auto;">
    <div class="card">
        <div style="background: linear-gradient(135deg, #7c3aed, #4c1d95); padding: 2rem; text-align: center; color: white;">
            <div style="font-size: 3rem;">📝</div>
            <h2 style="margin-top: 0.5rem;">Create Your Account</h2>
            <p style="opacity: 0.85; font-size: 0.9rem;">Join us to book halls for your events</p>
        </div>
        <div class="card-body">
            <form method="POST" novalidate>
                {% csrf_token %}

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Username <span class="required">*</span></label>
                        <input type="text" name="username" class="form-control" required
                               placeholder="Choose a username">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Full Name <span class="required">*</span></label>
                        <input type="text" name="full_name" class="form-control" required
                               placeholder="Your full name">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address <span class="required">*</span></label>
                    <input type="email" name="email" class="form-control" required
                           placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label class="form-label">User Type <span class="required">*</span></label>
                    <select name="user_type" class="form-control" required>
                        <option value="">-- Select Type --</option>
                        <option value="student">Student</option>
                        <option value="faculty">Faculty</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Password <span class="required">*</span></label>
                        <input type="password" name="password" id="password" class="form-control" required
                               placeholder="Minimum 6 characters">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password <span class="required">*</span></label>
                        <input type="password" name="confirm_password" id="confirm_password" class="form-control" required
                               placeholder="Repeat password">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.75rem;">
                    ✅ Create Account
                </button>
            </form>

            <div class="text-center mt-2" style="font-size: 0.9rem; color: #6b7280;">
                Already have an account?
                <a href="{% url 'login' %}" style="color: #7c3aed; font-weight: 600;">Login here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        const pw = document.getElementById('password').value;
        const cpw = document.getElementById('confirm_password').value;
        if (pw !== cpw) {
            e.preventDefault();
            alert('Passwords do not match!');
        }
    });
</script>
{% endblock %}
